<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI VIDEO STUDIO</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{

background:#09090f;
color:white;
overflow:hidden;

}

/* HEADER */

header{

height:70px;

background:#12121b;

display:flex;

justify-content:space-between;

align-items:center;

padding:0 25px;

border-bottom:1px solid #252535;

}

.logo{

font-size:24px;
font-weight:bold;
color:#7d3cff;

}

.export{

background:#7d3cff;

color:white;

padding:12px 25px;

border:none;

border-radius:10px;

cursor:pointer;

}

/* CONTENU */

.container{

display:flex;

height:calc(100vh - 70px);

}

/* SIDEBAR */

.sidebar{

width:250px;

background:#111118;

border-right:1px solid #252535;

padding:20px;

}

.sidebar h3{

margin-bottom:20px;

}

.menu{

display:flex;

flex-direction:column;

gap:12px;

}

.menu button{

padding:15px;

background:#1a1a25;

color:white;

border:none;

border-radius:10px;

cursor:pointer;

font-size:16px;

text-align:left;

transition:.3s;

}

.menu button:hover{

background:#7d3cff;

}

/* ZONE CENTRALE */

.workspace{

flex:1;

display:flex;

flex-direction:column;

}

/* CANVAS */

.canvas{

flex:1;

display:flex;

justify-content:center;

align-items:center;

background:#0f0f18;

}

.video{

width:850px;

height:480px;

background:#1d1d2d;

border:2px dashed #555;

border-radius:15px;

display:flex;

justify-content:center;

align-items:center;

font-size:24px;

color:#888;

}

/* TIMELINE */

.timeline{

height:180px;

background:#111118;

border-top:1px solid #252535;

padding:20px;

}

.track{

height:60px;

background:#1b1b28;

border-radius:8px;

display:flex;

align-items:center;

padding-left:15px;

}

/* IA */

.ai-panel{

width:350px;

background:#111118;

border-left:1px solid #252535;

padding:20px;

}

.ai-panel textarea{

width:100%;

height:170px;

background:#1b1b28;

border:none;

color:white;

padding:15px;

border-radius:10px;

resize:none;

}

.ai-panel button{

width:100%;

padding:15px;

margin-top:20px;

background:#7d3cff;

color:white;

border:none;

border-radius:10px;

font-size:16px;

cursor:pointer;

}

</style>

</head>

<body>

<header>

<div class="logo">

🎬 AI VIDEO STUDIO

</div>

<div>

<button class="export">

<i class="fa-solid fa-download"></i>

Exporter

</button>

</div>

</header>

<div class="container">

<!-- MENU -->

<div class="sidebar">

<h3>Outils</h3>

<div class="menu">

<button>🎬 Vidéo IA</button>

<button>🖼 Images IA</button>

<button>🎤 Voix IA</button>

<button>🎵 Musique IA</button>

<button>📝 Texte</button>

<button>📂 Upload</button>

<button>✨ Animations</button>

<button>⚙ Paramètres</button>

</div>

</div>

<!-- CENTRE -->

<div class="workspace">

<div class="canvas">

<div class="video">

APERÇU VIDÉO

</div>

</div>

<div class="timeline">

<h3>Timeline</h3>

<br>

<div class="track">

Piste Vidéo

</div>

</div>

</div>

<!-- IA -->

<div class="ai-panel">

<h2>Créer une vidéo IA</h2>

<br>

<textarea placeholder="Exemple :

Crée une publicité de 30 secondes pour une boisson énergisante avec une voix masculine et une musique dynamique..."></textarea>

<button>

✨ Générer la vidéo

</button>

</div>

</div>

<script>

document.querySelector(".ai-panel button").onclick=function(){

const prompt=document.querySelector("textarea").value;

if(prompt==""){

alert("Décris d'abord la vidéo.");

return;

}

alert("Fonction IA bientôt disponible.\n\nPrompt :\n"+prompt);

}

</script>

</body>

</html>
