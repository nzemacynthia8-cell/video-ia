<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Récupération de clé - AI VIDEO STUDIO</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
}
body {
    background: radial-gradient(circle at center, #11111f 0%, #050508 100%);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
}
.card {
    background: rgba(17, 17, 24, 0.95);
    backdrop-filter: blur(16px);
    border: 1px solid #252535;
    padding: 45px;
    border-radius: 24px;
    width: 100%;
    max-width: 440px;
    box-shadow: 0 25px 60px rgba(0, 0, 0, 0.7), 0 0 40px rgba(125, 60, 255, 0.1);
    text-align: center;
}
h2 {
    font-size: 28px;
    font-weight: 800;
    background: linear-gradient(135deg, #b388ff, #7d3cff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 1px;
    margin-bottom: 10px;
}
.sub {
    color: #70708a;
    font-size: 14px;
    margin-bottom: 30px;
    line-height: 1.5;
}
.input-group {
    position: relative;
    margin-bottom: 22px;
    text-align: left;
}
.input-group input {
    width: 100%;
    padding: 16px 16px 16px 54px;
    background: #0d0d14;
    border: 1px solid #232333;
    color: white;
    border-radius: 14px;
    outline: none;
    font-size: 15px;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
.input-group input:focus {
    border-color: #7d3cff;
    background: #11111f;
    box-shadow: 0 0 18px rgba(125, 60, 255, 0.2);
}
.input-group i {
    position: absolute;
    left: 20px;
    top: 50%;
    transform: translateY(-50%);
    color: #4e4e66;
    font-size: 18px;
    transition: color 0.3s ease;
}
.input-group input:focus ~ i {
    color: #7d3cff;
}
button {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, #8c52ff, #7d3cff);
    color: white;
    border: none;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(125, 60, 255, 0.3);
}
button:hover {
    background: linear-gradient(135deg, #9d6eff, #6b2be6);
    box-shadow: 0 8px 25px rgba(125, 60, 255, 0.5);
    transform: translateY(-2px);
}
button:active {
    transform: translateY(0);
}
.back-link {
    margin-top: 30px;
}
.back-link a {
    color: #8b5cf6;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    transition: color 0.2s;
}
.back-link a:hover {
    color: #b388ff;
    text-decoration: underline;
}
.error {
    color: #ff6b6b;
    font-size: 14px;
    margin-top: 14px;
    min-height: 20px;
    font-weight: 500;
}
.success {
    color: #4ade80;
    font-size: 14px;
    margin-top: 14px;
    min-height: 20px;
    font-weight: 500;
}
.hidden {
    display: none;
}
</style>
</head>
<body>

<div class="card">
    <h2>Mot de passe oublié</h2>

    <!-- ÉTAPE 1 : Saisie de l'adresse email -->
    <div id="etape1">
        <p class="sub">Entrez votre adresse e-mail pour configurer vos nouveaux accès système.</p>
        <div class="input-group">
            <input type="email" id="email" placeholder="Adresse e-mail professionnelle" required>
            <i class="fa-solid fa-envelope"></i>
        </div>
        <button onclick="verifierEmail()">Continuer</button>
        <div class="error" id="error1"></div>
    </div>

    <!-- ÉTAPE 2 : Définition du nouveau mot de passe -->
    <div id="etape2" class="hidden">
        <p class="sub">Choisissez votre nouvelle clé d'accès sécurisée.</p>
        <div class="input-group">
            <input type="password" id="newPassword" placeholder="Nouveau mot de passe" required>
            <i class="fa-solid fa-lock"></i>
        </div>
        <div class="input-group">
            <input type="password" id="confirmPassword" placeholder="Confirmer le mot de passe" required>
            <i class="fa-solid fa-check-double"></i>
        </div>
        <button onclick="reinitialiser()">Mettre à jour la clé</button>
        <div class="error" id="error2"></div>
        <div class="success" id="success2"></div>
    </div>

    <p class="back-link"><a href="auth_7.html"><i class="fa-solid fa-arrow-left"></i> Retour à la connexion</a></p>
</div>

<script>
let emailValide = "";

function verifierEmail(){
    let email = document.getElementById("email").value.trim();
    let errorBox = document.getElementById("error1");
    
    if(!email || !email.includes('@')){ 
        errorBox.innerHTML = "⚠️ Spécifiez un e-mail valide."; 
        return; 
    }
    
    emailValide = email;
    errorBox.innerHTML = "";
    document.getElementById("etape1").classList.add("hidden");
    document.getElementById("etape2").classList.remove("hidden");
}

function reinitialiser(){
    let newPassword = document.getElementById("newPassword").value;
    let confirmPassword = document.getElementById("confirmPassword").value;
    let errorBox = document.getElementById("error2");
    let successBox = document.getElementById("success2");

    if(!newPassword || !confirmPassword){ 
        errorBox.innerHTML = "⚠️ Remplissez tous les champs."; 
        return; 
    }
    if(newPassword !== confirmPassword){ 
        errorBox.innerHTML = "❌ Mots de passe différents."; 
        return; 
    }

    localStorage.setItem("password", newPassword);
    const extractedName = emailValide.split('@')[0];
    localStorage.setItem("nom", extractedName);
    
    errorBox.innerHTML = "";
    successBox.innerHTML = "🎉 Profil mis à jour avec succès !";
    
    setTimeout(() => { 
        window.location.replace("auth_7.html"); 
    }, 1500);
}
</script>
</body>
</html>
