<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscription</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#09090f;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
width:430px;
background:#14141d;
padding:40px;
border-radius:15px;
box-shadow:0 0 20px rgba(120,0,255,.3);
}

h2{
color:white;
text-align:center;
margin-bottom:25px;
}

input{
width:100%;
padding:15px;
margin:10px 0;
background:#1f1f2d;
border:none;
border-radius:8px;
color:white;
}

button{
width:100%;
padding:15px;
background:#7d3cff;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
margin-top:15px;
}

button:hover{
background:#6325e6;
}

p{
margin-top:20px;
text-align:center;
color:#aaa;
}

a{
color:#8b5cf6;
text-decoration:none;
}

</style>

</head>

<body>

<div class="card">

<h2>Créer un compte</h2>

<input type="text" id="nom" placeholder="Nom complet">

<input type="email" id="email" placeholder="Adresse Email">

<input type="password" id="password" placeholder="Mot de passe">

<input type="password" id="confirm" placeholder="Confirmer le mot de passe">

<button onclick="register()">Créer le compte</button>

<p>Déjà inscrit ?
<a href="login.html">Connexion</a></p>

</div>

<script>

function register(){

let nom=document.getElementById("nom").value;

let email=document.getElementById("email").value;

let password=document.getElementById("password").value;

let confirm=document.getElementById("confirm").value;

if(nom=="" || email=="" || password=="" || confirm==""){

alert("Veuillez remplir tous les champs");

return;

}

if(password!=confirm){

alert("Les mots de passe ne correspondent pas");

return;

}

localStorage.setItem("nom",nom);
localStorage.setItem("email",email);
localStorage.setItem("password",password);

alert("Compte créé avec succès");

window.location.href="login.html";

}

</script>

</body>

</html><script>
  document.getElementById("formInscription").addEventListener("submit", function(e) {
    e.preventDefault();
    alert("Inscription réussie !");
    window.location.href = "index.html"; // Redirection vers accueil
  });
</script>
